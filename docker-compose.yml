services:
  # Production app — docker compose up --build
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Override with a strong secret before deploying anywhere public.
      TOKEN_SECRET: change-me-in-production

  # Unit tests — docker compose run --rm test-unit
  # Uses the builder stage (has source + devDependencies); no browser needed.
  test-unit:
    build:
      context: .
      target: builder
    command: npm run test:unit
    profiles: ["test"]
